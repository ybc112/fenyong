services:
  - type: web
    name: crypto-zenith
    runtime: static
    rootDir: frontend 3
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_CHAIN_ID
        value: 0x38
      - key: VITE_NBT_TOKEN
        value: 0xD0F2A86C7EbCeE887F5bFB86771f994CD142bD04
      - key: VITE_STAKING_BANK
        value: 0xFDfCA0C575ad1643cA2F7A044f104cF6fe77B6DA
      - key: VITE_NBT_PAIR
        value: ""
      - key: VITE_FEE_TOKEN
        value: 0x55d398326f99059fF775485246999027B3197955
